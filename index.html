<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>KB GIS · 해외대체투자 뉴스</title>
<meta name="description" content="한국 LP·해외 GP·CIO 인사 등 해외대체투자 시장뉴스를 매일 아침 브리핑. AI 3줄 요약과 영문 원문 제공.">

<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#1c1d1f">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">

<!-- iOS home-screen install -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="KB GIS">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #e7e5df;
    font-family: Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
    font-variant-numeric: tabular-nums;
    -webkit-tap-highlight-color: transparent;
  }
  input { font-family: inherit; }

  /* #root centers the phone frame and fills the viewport */
  #root {
    box-sizing: border-box;
    width: 100%;
    min-width: 0;
    min-height: 100dvh;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Phone frame as a centered card on large screens (matches the design mockup) */
  .app-frame {
    width: 404px;
    height: 872px;
    min-width: 0;
    background: #fff;
    border-radius: 42px;
    border: 1px solid #dedbd3;
    box-shadow: 0 24px 70px rgba(28,29,31,.20);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* On actual phones / installed app: fill the whole screen, drop the frame chrome */
  @media (max-width: 480px) {
    body { background: #1c1d1f; }
    #root { padding: 0; align-items: stretch; }
    .app-frame {
      width: 100%;
      height: 100dvh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
  }
  @media (display-mode: standalone) {
    #root { padding: 0; align-items: stretch; }
    .app-frame {
      width: 100%;
      height: 100dvh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="./vendor/react.production.min.js"></script>
<script src="./vendor/react-dom.production.min.js"></script>
<script src="./app.js"></script>

<script>
  // Register the service worker so the app works offline and is installable.
  // 새 버전 배포 시: 앱을 껐다 켜면(또는 새로고침) 새 서비스워커가 즉시 적용되고
  // 페이지가 한 번 자동 새로고침되어 최신 화면으로 갱신됩니다.
  if ('serviceWorker' in navigator) {
    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (refreshing) return;            // 새 SW가 제어권을 잡으면 한 번만 새로고침
      refreshing = true;
      window.location.reload();
    });
    window.addEventListener('load', function () {
      // updateViaCache:'none' → sw.js 를 항상 새로 받아 새 버전을 놓치지 않음
      navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
        .then(function (reg) {
          reg.update();                  // 매 실행마다 새 버전 확인
          setInterval(function () { reg.update(); }, 60 * 60 * 1000);
        })
        .catch(function (e) { console.warn('SW registration failed', e); });
    });
  }
</script>
</body>
</html>
