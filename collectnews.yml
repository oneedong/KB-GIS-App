name: Collect news

# 해외대체투자 뉴스를 주기적으로 자동 수집해 news.json 을 갱신합니다.
on:
  schedule:
    - cron: '0 */3 * * *'   # 3시간마다 (UTC 기준)
  workflow_dispatch: {}       # 수동 실행 버튼
  push:
    branches: [ main ]        # 배포 직후 한 번 채우기
    paths: [ 'scripts/collect-news.mjs', 'scripts/update-allocations.mjs', '.github/workflows/collect-news.yml' ]

permissions:
  contents: write

concurrency:
  group: collect-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # rebase 를 위해 전체 히스토리 확보
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Collect
        run: node scripts/collect-news.mjs
        env:
          # (선택) 무료 Gemini 키를 저장소 Secrets에 GEMINI_API_KEY 로 넣으면
          # 진짜 3줄 요약이 붙습니다. 없으면 추출식 요약으로 동작합니다.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Update LP allocations
        # 공개·기계가독 데이터가 있는 기관(국민연금 등)만 자동 갱신합니다.
        # DATA_GO_KR_KEY(공공데이터포털 키)가 없으면 시드값을 그대로 유지합니다.
        run: node scripts/update-allocations.mjs
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          NPS_FUND_URL: ${{ secrets.NPS_FUND_URL }}
      - name: Commit updated data
        run: |
          git config user.name  "kbgis-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json allocations.json
          if git diff --cached --quiet; then
            echo "No changes."; exit 0
          fi
          git commit -m "chore: refresh news feed & allocations [skip ci]"
          # 원격이 그새 바뀌어도(다른 실행·직접 업로드) rebase 후 푸시, 충돌 시 재시도.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main \
              && git push origin HEAD:main \
              && echo "pushed" && exit 0
            echo "push 충돌 — 재시도 $i"; sleep $((i * 3))
          done
          echo "재시도 후에도 푸시 실패"; exit 1
