name: Fetch URL (diagnostic)

on:
  workflow_dispatch:
    inputs:
      url:
        description: '진단할 기사 URL'
        required: true
        type: string

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch and analyze
        run: node scripts/fetch-article.mjs "${{ inputs.url }}"
