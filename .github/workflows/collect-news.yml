name: Collect news

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths: [ 'scripts/collect-news.mjs', '.github/workflows/collect-news.yml' ]

permissions:
  contents: write

concurrency:
  group: collect-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Collect
        run: node scripts/collect-news.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Rebuild LP roster
        run: node scripts/gen-institutions.mjs
      - name: Commit updated feed
        run: |
          git config user.name  "kbgis-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet news.json insights.json institutions.json; then
            git add news.json insights.json institutions.json
            git commit -m "chore: refresh news feed [skip ci]"
            # 수집이 길어진 사이 main 이 앞서가면 리베이스 후 재시도 (푸시 경합 방지)
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main || exit 1
              [ "$i" = "3" ] && exit 1
            done
          else
            echo "No changes."
          fi
